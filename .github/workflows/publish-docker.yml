name: Publish Docker image

# Triggered only by version tags (e.g. `git tag v0.1.0 && git push --tags`).
# Bleeding-edge users can still build locally from main; we don't auto-publish
# every commit to keep the registry tidy and the image trustworthy.
on:
  push:
    tags:
      - "v*"
  # Allow manual builds from the Actions tab for testing the workflow itself.
  workflow_dispatch:

permissions:
  contents: read
  packages: write  # required to push to ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Multi-arch build needs QEMU to emulate the non-host arch (arm64 on
      # an amd64 runner) and buildx to drive the cross-platform builder.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives image tags + OCI labels from the git ref. For a tag `v1.2.3`
      # this produces: `1.2.3`, `1.2`, `1`, and `latest`.
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Round-trip the layer cache through the GitHub Actions cache so
          # the second arch (and subsequent runs) don't redo work.
          cache-from: type=gha
          cache-to: type=gha,mode=max
