services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/${WORKSPACE_NAME}:cached
      - ${HOME}/.claude:/home/vscode/.claude
      - ${HOME}/.claude.json:/home/vscode/.claude.json
    environment:
      ANTHROPIC_BASE_URL: http://claude-redact:8888
    command: sleep infinity
    depends_on:
      claude-redact:
        condition: service_healthy

  claude-redact:
    image: ghcr.io/kuco23/claude-redact:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      # initialize.sh mints this on first run and preserves it across
      # rebuilds, so secret→fake bindings survive container restarts.
      # Unset on the host ⇒ blank here ⇒ proxy falls back to per-process
      # random (no persistence). See the README "Caveats" for the
      # security tradeoff of pinning the seed.
      CLAUDE_REDACT_SEED: ${CLAUDE_REDACT_SEED:-}
    # healthcheck inherited from the image
